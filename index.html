<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Super Profile | Store</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="container">
        <div class="profile">
            <img src="1769569731390.png" alt="Profile" class="profile-img">
            <h1>@YourName</h1>
            <p>Exclusive Digital Products & Notes</p>
        </div>

        <h2 class="section-title">Latest Products</h2>
        <div class="products-grid">
            
            <div class="product-card">
                <img src="https://via.placeholder.com/150" alt="Product 1" class="p-img">
                <h3>Class 12th Notes</h3>
                <span class="price">₹49</span>
                <a href="https://wa.me/91XXXXXXXXXX?text=Hi, I want to buy Class 12th Notes" class="buy-btn">Buy Now</a>
            </div>

            <div class="product-card">
                <img src="https://via.placeholder.com/150" alt="Product 2" class="p-img">
                <h3>Editing Pack</h3>
                <span class="price">₹99</span>
                <a href="https://wa.me/91XXXXXXXXXX?text=Hi, I want to buy Editing Pack" class="buy-btn">Buy Now</a>
            </div>

        </div>

        <h2 class="section-title">Connect with Me</h2>
        <div class="links">
            <a href="upi://pay?pa=YOURUPIID@okaxis&pn=YourName&cu=INR" class="link-card upi">
                <i class="fa-solid fa-bolt"></i> Direct Pay via UPI
            </a>
            <a href="https://youtube.com/@YourChannel" class="link-card">
                <i class="fa-brands fa-youtube"></i> YouTube
            </a>
        </div>

        <div class="footer">
            <p>Made with ❤️ on GitHub</p>
        </div>
    </div>

</body>
</html>
